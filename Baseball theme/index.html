<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseball Day Menu</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #ffffff 0%, #fdf5f5 60%, #ffdede 100%);
  color: #1a1a1a;
  font-family: 'Georgia', 'Segoe UI', sans-serif;
  text-align: center;
  min-height: 100vh;
  padding: 20px;
  padding-bottom: 100px;
  position: relative;
  overflow-x: hidden;
}

/* Baseball stripe background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(204,0,0,0.06) 59px, rgba(204,0,0,0.06) 60px);
  pointer-events: none;
  z-index: 0;
}

/* Floating baseballs */
@keyframes spin {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(180deg); }
  100% { transform: translateY(0px) rotate(360deg); }
}

.baseball {
  position: fixed;
  color: #cc0000;
  font-size: 22px;
  opacity: 0.25;
  pointer-events: none;
  z-index: 1;
  animation: spin 6s ease-in-out infinite;
}

.baseball:nth-child(1) { left: 5%;  top: 15%; animation-duration: 7s;  animation-delay: 0s; }
.baseball:nth-child(2) { left: 15%; top: 70%; animation-duration: 9s;  animation-delay: 1s; }
.baseball:nth-child(3) { left: 80%; top: 20%; animation-duration: 8s;  animation-delay: 2s; }
.baseball:nth-child(4) { left: 90%; top: 65%; animation-duration: 6s;  animation-delay: 0.5s; }
.baseball:nth-child(5) { left: 50%; top: 80%; animation-duration: 10s; animation-delay: 1.5s; }
.baseball:nth-child(6) { left: 35%; top: 10%; animation-duration: 8.5s;animation-delay: 2.5s; }

/* Header */
.header {
  margin-bottom: 30px;
  animation: slideDown 0.6s ease-out;
  position: relative;
  z-index: 10;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to   { opacity: 1; transform: translateY(0); }
}

h1 {
  font-family: 'Georgia', 'Impact', serif;
  font-size: clamp(40px, 8vw, 65px);
  color: #cc0000;
  text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.15);
  margin: 20px 0 10px;
  animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
  0%,100% { text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.15); }
  50%      { text-shadow: 3px 3px 0px #fff, 5px 5px 8px rgba(204,0,0,0.4); }
}

h2 {
  font-size: clamp(18px, 3vw, 26px);
  color: #cc0000;
  margin-bottom: 20px;
}

/* Nav buttons */
.nav-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 30px;
  position: relative;
  z-index: 10;
}

.nav-btn {
  padding: 12px 24px;
  background: linear-gradient(145deg, #cc0000, #aa0000);
  color: #ffffff;
  font-size: 18px;
  font-weight: bold;
  border: 2px solid #ffffff;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  text-decoration: none;
  display: inline-block;
}

.nav-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  background: linear-gradient(145deg, #e60000, #cc0000);
}

.back-btn {
  background: linear-gradient(145deg, #ffffff, #f5f5f5);
  color: #cc0000;
  border: 2px solid #cc0000;
}

.back-btn:hover {
  background: linear-gradient(145deg, #f5f5f5, #ffe5e5);
}

/* Add item form */
.form-container {
  position: relative;
  z-index: 10;
  max-width: 500px;
  margin: 0 auto 20px;
}

#addItemForm {
  display: none;
  background: linear-gradient(145deg, #ffffff, #f5f5f5);
  border: 3px solid #cc0000;
  border-radius: 16px;
  padding: 20px;
  text-align: left;
  box-shadow: 3px 3px 0px #cc0000;
  animation: fadeIn 0.3s ease-out;
}

#addItemForm h3 { color: #8B0000; margin-bottom: 14px; font-size: 18px; }
#addItemForm label { font-size: 12px; color: #555; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; margin-top: 10px; }
#addItemForm input, #addItemForm select {
  width: 100%; padding: 9px 12px; border-radius: 8px;
  border: 2px solid #cc0000; background: #f9f9f9; color: #1a1a1a;
  font-size: 14px; transition: border-color 0.2s;
}
#addItemForm input:focus, #addItemForm select:focus { outline: none; border-color: #8B0000; }
#saveNewItem {
  width: 100%; margin-top: 14px; padding: 11px;
  background: linear-gradient(145deg, #c62828, #8B0000);
  color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
  cursor: pointer; transition: all 0.3s;
}
#saveNewItem:hover { background: linear-gradient(145deg, #e53935, #c62828); transform: translateY(-2px); }

/* Menu grid */
.menu-container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  position: relative;
  z-index: 10;
  animation: fadeIn 0.8s ease-out 0.2s backwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.menu-header {
  font-family: 'Georgia', serif;
  font-size: clamp(28px, 5vw, 36px);
  color: #cc0000;
  text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
  margin-bottom: 15px;
  text-decoration: underline;
  text-underline-offset: 8px;
}

.menu-column {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

/* Menu items */
.item {
  background: #ffffff;
  border: 3px solid #cc0000;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  box-shadow: 3px 3px 0px #cc0000, 0 4px 10px rgba(0,0,0,0.1);
}

.item:hover {
  transform: translateY(-5px) scale(1.03);
  box-shadow: 6px 6px 0px #cc0000, 0 8px 20px rgba(204,0,0,0.2);
}

.item:focus { outline: 3px solid #cc0000; outline-offset: 3px; }

.item img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid #cc0000;
  flex-shrink: 0;
  transition: transform 0.3s;
}

.item:hover img {
  transform: rotate(5deg) scale(1.1);
}

.item-text {
  text-align: left;
  flex: 1;
  min-width: 0;
}

.item-name {
  font-size: clamp(22px, 4vw, 28px);
  margin: 0 0 5px 0;
  font-weight: 700;
  word-wrap: break-word;
  color: #1a1a1a;
}

.item-price {
  font-size: clamp(18px, 3vw, 22px);
  color: #cc0000;
  margin: 0;
  font-weight: bold;
}

/* Out of stock */
.out-of-stock {
  opacity: 0.5;
  text-decoration: line-through;
}

.out-of-stock img {
  filter: grayscale(100%);
}

.out-of-stock::after {
  content: '⚾ OUT OF STOCK';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.8);
  color: #ff4444;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
  pointer-events: none;
}

/* Remove Button */
.remove-btn {
  background: #cc0000;
  color: white;
  border: none;
  padding: 8px 14px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  margin-left: auto;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.item:hover .remove-btn {
  opacity: 1;
  pointer-events: auto;
}

.remove-btn:hover {
  background: #8B0000;
  transform: scale(1.1);
}

/* Loading / error */
#loadingMsg { font-size: 28px; color: #cc0000; margin: 60px auto; position: relative; z-index: 10; }
#errorMsg   { font-size: 16px; color: #cc0000; background: rgba(204,0,0,0.05); border: 2px solid #cc0000; padding: 16px 24px; border-radius: 10px; margin: 20px auto; max-width: 600px; display: none; position: relative; z-index: 10; }

/* Logo */
.bottom-right-image {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 140px;
  height: auto;
  z-index: 9999;
  transition: transform 0.3s;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
}

.bottom-right-image:hover {
  transform: scale(1.1) rotate(5deg);
}

@media (max-width: 1024px) { .menu-container { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  body { padding: 15px; padding-bottom: 120px; }
  .menu-container { grid-template-columns: 1fr; }
  .item img { width: 60px; height: 60px; }
  .bottom-right-image { width: 100px; }
}
@media (max-width: 480px) {
  .item img { width: 50px; height: 50px; }
  .bottom-right-image { width: 80px; }
}
@media (hover: none) {
  .remove-btn { opacity: 1; pointer-events: auto; }
  .item { min-height: 90px; }
}
</style>
</head>
<body>

<!-- Floating baseballs -->
<div class="baseball">⚾</div>
<div class="baseball">⚾</div>
<div class="baseball">⚾</div>
<div class="baseball">⚾</div>
<div class="baseball">⚾</div>
<div class="baseball">⚾</div>

<div class="header">
  <h1>⚾ Red &amp; White Day Menu ⚾</h1>
  <h2>Play Ball — Grab a Snack!</h2>
</div>

<div class="nav-buttons">
  <a href="../index.html" class="nav-btn back-btn">⬅️ Back to Launcher</a>
  <button id="addItemBtn" class="nav-btn">➕ Add New Item</button>
</div>

<div class="form-container">
  <div id="addItemForm">
    <h3>Add Menu Item</h3>
    <label for="newCategory">Category:</label>
    <select id="newCategory">
      <option value="foodColumn">Food</option>
      <option value="drinkColumn">Drinks</option>
      <option value="snackColumn">Snacks</option>
      <option value="snackColumn2">More Snacks</option>
    </select>
    <label for="newName">Item Name:</label>
    <input id="newName" type="text" placeholder="e.g., Pretzel">
    <label for="newPrice">Price:</label>
    <input id="newPrice" type="text" placeholder="e.g., 2.50">
    <label for="newImage">Image Path:</label>
    <input id="newImage" type="text" placeholder="e.g., ../images/pretzel.jpg">
    <button id="saveNewItem">Add Item</button>
  </div>
</div>

<p id="loadingMsg">Loading menu...</p>
<p id="errorMsg">⚠️ Could not load items.json. Make sure it's in the root project folder.</p>

<div class="menu-container" id="menuContainer" style="display:none">
  <div class="menu-column" id="foodColumn"><div class="menu-header">FOOD</div></div>
  <div class="menu-column" id="drinkColumn"><div class="menu-header">DRINKS</div></div>
  <div class="menu-column" id="snackColumn"><div class="menu-header">SNACKS</div></div>
  <div class="menu-column" id="snackColumn2"><div class="menu-header">MORE SNACKS</div></div>
</div>

<img src="../images/logo.png" class="bottom-right-image" alt="Logo">

<script>
function attachToggle(item, column) {
  const handler = () => {
    item.classList.toggle('out-of-stock');
    column.removeChild(item);
    if (item.classList.contains('out-of-stock')) {
      column.appendChild(item);
    } else {
      const firstOut = column.querySelector('.out-of-stock');
      firstOut ? column.insertBefore(item, firstOut) : column.appendChild(item);
    }
    saveStatus();
  };
  item.addEventListener('click', handler);
  item.addEventListener('keypress', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); handler(); } });
}

function attachRemoveBtn(item) {
  const btn = document.createElement('button');
  btn.className = 'remove-btn';
  btn.textContent = '✕';
  btn.setAttribute('aria-label', 'Remove item');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm('Remove this item?')) { item.remove(); saveStatus(); }
  });
  item.appendChild(btn);
}

function buildItem(data, column) {
  const div = document.createElement('div');
  div.className = 'item' + (data.outOfStock ? ' out-of-stock' : '');
  div.setAttribute('tabindex', '0');
  div.innerHTML = `
    <img src="${data.img}" alt="${data.name}" onerror="this.style.display='none'">
    <div class="item-text">
      <p class="item-name">${data.name}</p>
      <p class="item-price">${data.price}</p>
    </div>`;
  attachToggle(div, column);
  attachRemoveBtn(div);
  return div;
}

function saveStatus() {
  const items = [];
  document.querySelectorAll('.item').forEach(item => {
    items.push({
      name: item.querySelector('.item-name').textContent.trim(),
      price: item.querySelector('.item-price').textContent.trim(),
      img: item.querySelector('img') ? item.querySelector('img').getAttribute('src') : '',
      category: item.closest('.menu-column').id,
      outOfStock: item.classList.contains('out-of-stock')
    });
  });
  localStorage.setItem('baseballMenuItems', JSON.stringify(items));
}

async function loadMenu() {
  try {
    let data;
    // First try adminMenuData (from admin panel)
    const adminSaved = localStorage.getItem('adminMenuData');
    // Then try items.json
    try {
      const res = await fetch('../items.json');
      if (!res.ok) throw new Error('fetch failed');
      data = await res.json();
    } catch {
      if (adminSaved) {
        data = JSON.parse(adminSaved);
      } else {
        throw new Error('no data');
      }
    }

    // Check for baseball-specific saved state (out-of-stock overrides)
    const localSaved = JSON.parse(localStorage.getItem('baseballMenuItems') || '[]');
    const localMap = {};
    localSaved.forEach(i => { localMap[i.name] = i; });

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('menuContainer').style.display = 'grid';

    ['foodColumn','drinkColumn','snackColumn','snackColumn2'].forEach(col => {
      const column = document.getElementById(col);
      (data[col] || []).forEach(itemData => {
        const localItem = localMap[itemData.name];
        const merged = { ...itemData, outOfStock: localItem ? localItem.outOfStock : (itemData.outOfStock || false) };
        column.appendChild(buildItem(merged, column));
      });
    });
  } catch(e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}

document.getElementById('addItemBtn').addEventListener('click', () => {
  const form = document.getElementById('addItemForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('saveNewItem').addEventListener('click', () => {
  const category = document.getElementById('newCategory').value;
  const name  = document.getElementById('newName').value.trim();
  const price = document.getElementById('newPrice').value.trim();
  const img   = document.getElementById('newImage').value.trim();
  if (!name || !price || !img) { alert('Please fill all fields!'); return; }
  const column = document.getElementById(category);
  const item = buildItem({ name, price: price.startsWith('$') ? price : '$'+price, img, outOfStock: false }, column);
  column.appendChild(item);
  saveStatus();
  document.getElementById('newName').value = '';
  document.getElementById('newPrice').value = '';
  document.getElementById('newImage').value = '';
  document.getElementById('addItemForm').style.display = 'none';
  alert('Item added!');
});

loadMenu();
</script>
</body>
</html>
